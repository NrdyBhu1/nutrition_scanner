name: Flutter APK Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK & Upload Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4" # pin or use 'stable'
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      # ── Optional: sign the APK ──────────────────────────────────────────────
      # Uncomment + add secrets if you want a signed release APK.
      #
      # - name: Decode keystore
      #   run: |
      #     echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
      #
      # - name: Build signed APK
      #   run: |
      #     flutter build apk --release \
      #       --dart-define=KEYSTORE_PATH=keystore.jks \
      #       --dart-define=KEY_ALIAS=${{ secrets.KEY_ALIAS }} \
      #       --dart-define=KEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
      #       --dart-define=STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
      # ───────────────────────────────────────────────────────────────────────

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK with tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/nutrition_scanner-${TAG}.apk

      - name: Create GitHub Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Release ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/nutrition_scanner-*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
