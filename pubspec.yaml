name: nutrition_scanner
description: Barcode scanner app with local nutrition DB lookup and health scoring.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # Local SQLite DB
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Pie chart
  fl_chart: ^0.69.0

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
