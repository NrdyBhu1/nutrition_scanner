name: nutrition_scanner
description: Barcode scanner app with local nutrition DB lookup and health scoring.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Barcode scanning
  mobile_scanner: ^5.2.3

  # Local SQLite DB
  sqflite: ^2.3.3+1
  path_provider: ^2.1.4
  path: ^1.9.0

  # Pie chart
  fl_chart: ^0.69.0
  http: ^1.2.2

  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_local_notifications: ^22.0.1

  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icon/icon.png

flutter_launcher_icons:
  android: "launcher_icon" # true or a specific icon name
  ios: false # true or a specific icon name
  image_path: "assets/icon/icon.png"
